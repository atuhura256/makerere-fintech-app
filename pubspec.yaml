name: makerere_fintech_app
description: "A new Flutter project for SACCO financial management and audit."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  share_plus: ^10.0.0
  # Core Services
  supabase_flutter: ^2.3.0
  http: ^1.2.0

  # State Management & Storage
  flutter_bloc: ^8.1.6
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI & Utilities
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  cached_network_image: ^3.4.0
  flutter_svg: ^2.0.10
  webview_flutter: ^4.14.0

  # Security & Documents
  crypto: ^3.0.3
  pdf: ^3.10.0

  # General
  equatable: ^2.0.5
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/